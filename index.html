<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy New Year Fonts Showcase</title>
    <!-- 引入所需的Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Pacifico&family=Dancing+Script&family=Comfortaa&family=Kalam&family=Gloria+Hallelujah&family=Patrick+Hand&family=Permanent+Marker&family=Luckiest+Guy&family=Chewy&family=Annie+Use+Your+Telescope&family=Nothing+You+Could+Do&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        h2 {
            font-size: 1.5em;
            color: #FFD700;
        }
        .font-container {
            margin: 20px 0;
        }
        .font-sample {
            font-size: 2em;
            text-shadow: 2px 2px 4px #000;
            animation: float 3s ease-in-out infinite;
        }
        .lobster { font-family: 'Lobster', cursive; color: #FFD700; }
        .pacifico { font-family: 'Pacifico', cursive; color: #ff69b4; }
        .dancing-script { font-family: 'Dancing Script', cursive; color: #ff6347; }
        .comfortaa { font-family: 'Comfortaa', cursive; color: #4169e1; }
        .kalam { font-family: 'Kalam', cursive; color: #9acd32; }
        .gloria-hallelujah { font-family: 'Gloria Hallelujah', cursive; color: #ffeb3b; }
        .patrick-hand { font-family: 'Patrick Hand', cursive; color: #ff4500; }
        .permanent-marker { font-family: 'Permanent Marker', cursive; color: #6a5acd; }
        .luckiest-guy { font-family: 'Luckiest Guy', cursive; color: #ff6347; }
        .chewy { font-family: 'Chewy', cursive; color: #daa520; }
        .annie-telescope { font-family: 'Annie Use Your Telescope', cursive; color: #00ced1; }
        .nothing-could-do { font-family: 'Nothing You Could Do', cursive; color: #8a2be2; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="font-container lobster">
        <h2>Lobster</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container pacifico">
        <h2>Pacifico</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container dancing-script">
        <h2>Dancing Script</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container comfortaa">
        <h2>Comfortaa</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container kalam">
        <h2>Kalam</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container gloria-hallelujah">
        <h2>Gloria Hallelujah</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container patrick-hand">
        <h2>Patrick Hand</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container permanent-marker">
        <h2>Permanent Marker</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container luckiest-guy">
        <h2>Luckiest Guy</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container chewy">
        <h2>Chewy</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container annie-telescope">
        <h2>Annie Use Your Telescope</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container nothing-could-do">
        <h2>Nothing You Could Do</h2>
        <div class="font-sample">新年快乐</div>
    </div>
</body>
</html>
