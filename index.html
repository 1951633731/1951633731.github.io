<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy New Year Fonts Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: 'Noto Sans SC', sans-serif; /* 作为备选字体 */
        }
        h2 {
            font-size: 1.5em;
            color: #FFD700;
        }
        .font-container {
            margin: 20px 0;
        }
        .font-sample {
            font-size: 2em;
            text-shadow: 2px 2px 4px #000;
            animation: float 3s ease-in-out infinite;
        }
        .zcoo-kuai-le { font-family: 'ZCOOL KuaiLe', cursive; color: #FFD700; }
        .zcoo-qing-ke { font-family: 'ZCOOL QingKe HuangYou', cursive; color: #ff69b4; }
        .ma-shan-zheng { font-family: 'Ma Shan Zheng', cursive; color: #ff6347; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="font-container zcoo-kuai-le">
        <h2>ZCOOL KuaiLe</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container zcoo-qing-ke">
        <h2>ZCOOL QingKe HuangYou</h2>
        <div class="font-sample">新年快乐</div>
    </div>
    <div class="font-container ma-shan-zheng">
        <h2>Ma Shan Zheng</h2>
        <div class="font-sample">新年快乐</div>
    </div>
</body>
</html>
